<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#151225"/>
      <stop offset="100%" stop-color="#0d0b1a"/>
    </linearGradient>
    <linearGradient id="g-text" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#g-bg)" rx="64"/>
  <!-- letras S K estilizadas -->
  <text x="60" y="210" font-family="sans-serif" font-size="36" font-weight="900" fill="url(#g-text)">S</text>
  <text x="280" y="210" font-family="sans-serif" font-size="36" font-weight="900" fill="url(#g-text)">K</text>
  <!-- grid background decorativo -->
  <g opacity="0.06" stroke="#f97316" stroke-width="1">
    <line x1="30" y1="260" x2="482" y2="260"/>
    <line x1="30" y1="300" x2="482" y2="300"/>
    <line x1="30" y1="340" x2="482" y2="340"/>
    <line x1="30" y1="380" x2="482" y2="380"/>
    <line x1="30" y1="420" x2="482" y2="420"/>
    <line x1="30" y1="460" x2="482" y2="460"/>
    <line x1="100" y1="220" x2="100" y2="480"/>
    <line x1="140" y1="220" x2="140" y2="480"/>
    <line x1="180" y1="220" x2="180" y2="480"/>
    <line x1="320" y1="220" x2="320" y2="480"/>
    <line x1="360" y1="220" x2="360" y2="480"/>
    <line x1="400" y1="220" x2="400" y2="480"/>
  </g>
  <!-- letras grid sample -->
  <g fill="#f97316" opacity="0.12" font-family="monospace" font-size="14">
    <text x="115" y="278">H</text><text x="155" y="278">I</text><text x="195" y="278">P</text>
    <text x="115" y="318">F</text><text x="155" y="318">L</text><text x="195" y="318">O</text>
    <text x="335" y="278">B</text><text x="375" y="278">E</text><text x="415" y="278">A</text>
    <text x="335" y="318">T</text><text x="375" y="318">S</text><text x="415" y="318">!</text>
  </g>
  <!-- word S K -->
  <text x="110" y="350" font-family="'Archivo Black',sans-serif" font-size="120" font-weight="900" fill="url(#g-text)" letter-spacing="8">SK</text>
  <!-- label -->
  <text x="170" y="460" font-family="sans-serif" font-size="12" fill="#8a86a0" letter-spacing="6">KNOWLEDGE</text>
</svg>
